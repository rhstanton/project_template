# GPU support (CUDA.jl) is intentionally NOT a dependency here. It is installed
# on demand by `JULIA_ENABLE_CUDA=1 make environment` into a separate, gitignored
# env (.julia/gpu-env) so this project stays portable (a non-GPU machine such as a
# Mac never installs it) and run_did.py uses it automatically when present.
