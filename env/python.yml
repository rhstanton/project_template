# Python environment for reproducible research template
# Includes core scientific packages and provenance tracking
name: project_template
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  # Core scientific packages
  # Upper bounds (<next-major) keep `conda env update` from silently jumping a
  # major version. A surprise pandas 2->3 jump is what broke the Julia bridge in
  # this project; bump these deliberately (and re-run make environment), not by drift.
  - numpy>=2,<3
  # pandas<3 specifically: PythonCall (pinned juliacall 0.9.31) cannot convert
  # pandas 3.x DataFrames to Julia (the Tables.jl interface changed in pandas 3.0),
  # which breaks run_did.py's jl.DataFrame(df). Bump with juliacall/PythonCall.
  - pandas>=2,<3
  - matplotlib>=3,<4
  - seaborn>=0.13,<1  # Statistical data visualization
  - scipy>=1,<2
  # Data analysis and databases
  - pyarrow>=24,<25  # Fast columnar data format
  - python-duckdb>=1,<2  # In-process SQL database
  - ibis-framework>=12,<13  # DataFrame API for multiple backends
  # For provenance and environment
  - pyyaml
  - jinja2  # Required for pandas LaTeX export
  - tomli  # For parsing TOML files (used in tests)
  - docopt  # CLI argument parsing with inline documentation
  # Interactive development
  - ipython  # Better REPL for development and Emacs integration
  - notebook  # Jupyter notebook
  - jupyterlab  # JupyterLab interface
  - ipywidgets  # Interactive widgets for notebooks
  - papermill>=2.4,<3  # Parameterized notebook execution for reproducible builds
  - nbformat>=5.9,<6  # Notebook format for programmatic access
  - nbconvert>=7.0,<8  # Convert and execute notebooks
  # Testing
  - pytest>=9,<10
  - pytest-cov>=7,<8
  # Code quality (pinned: a major bump can add lint/type errors that break CI)
  - ruff>=0.15,<0.16  # Linter and formatter (replaces black - faster and compatible)
  - mypy>=1.20,<2  # Type checker
  # Julia interoperability
  - pip:
    # Pinned: juliacall (Python) and PythonCall (Julia) use lockstep versioning and
    # must match exactly. The Julia depot (.julia) ships PythonCall 0.9.31, so an
    # unbounded juliacall lets `conda env update` bump it and break the bridge
    # ("empty intersection between PythonCall@0.9.31 and project compatibility ...").
    # To upgrade, bump this pin AND re-run `make environment` so both sides move together.
    - juliacall==0.9.31
    # Type stubs for better type checking
    - types-docopt
    - pandas-stubs
    - scipy-stubs
    # Reproducibility tools (git submodule in editable mode)
    - -e ../lib/repro-tools
